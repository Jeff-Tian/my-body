name: Deploy Marketing Page to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'marketing/**'
      - 'fastlane/**'
      - 'MyBodyUITests/**'
      - 'MyBody/**'
      - 'project.yml'
      - 'Gemfile*'
      - 'scripts/copy_screenshots.sh'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ${{ vars.RUNS_ON || 'macos-latest' }}
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      FASTLANE_SKIP_UPDATE_CHECK: '1'
      FASTLANE_HIDE_CHANGELOG: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode & simulator info
        run: |
          xcodebuild -version
          xcrun simctl list devices available | head -40

      - name: Install xcodegen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project MyBody.xcodeproj -scheme MyBody

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install fastlane
        run: |
          bundle config set --local path vendor/bundle
          bundle install --jobs 4

      - name: Generate screenshots via fastlane
        run: bundle exec fastlane screenshots

      - name: Copy screenshots into marketing site
        run: bash scripts/copy_screenshots.sh

      - name: List marketing output
        run: ls -la marketing/ marketing/screenshots/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./marketing
          publish_branch: gh-pages
          force_orphan: true

      - name: Display deployment URL
        run: |
          echo "🚀 Deployed to: https://jeff-tian.github.io/my-body/"
