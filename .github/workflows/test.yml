name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ${{ vars.RUNS_ON || 'macos-latest' }}
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode & simulator info
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep -E 'iPhone [0-9]+' | head -10

      - name: Install xcodegen & xcbeautify
        run: |
          brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: make gen

      - name: Run unit tests
        run: make test-unit
