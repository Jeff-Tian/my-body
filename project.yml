name: MyBody
options:
  bundleIdPrefix: brickverse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

schemes:
  MyBody:
    build:
      targets:
        MyBody: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  MyBody:
    type: application
    platform: iOS
    sources:
      - path: MyBody
    settings:
      base:
        INFOPLIST_FILE: MyBody/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: brickverse.MyBody
        PRODUCT_NAME: 我的身体
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "用于自动识别相册中的 InBody 报告并录入健康数据。"
        INFOPLIST_KEY_NSCameraUsageDescription: "用于拍摄 InBody 报告并自动识别健康数据。"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: "我的身体"
