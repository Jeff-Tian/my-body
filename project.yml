name: MyBody
options:
  bundleIdPrefix: brickverse
  # 主开发语言 = 简体中文；对齐 ASC 的 Primary Language，避免 Xcode 后续自动
  # 把 CFBundleDevelopmentRegion 设成 en。未来追加英文本地化时，原文(中文)会
  # 作为 fallback。
  developmentLanguage: "zh-Hans"
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

schemes:
  MyBody:
    build:
      targets:
        MyBody: all
        MyBodyUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MyBodyUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  MyBody:
    type: application
    platform: iOS
    sources:
      - path: MyBody
    dependencies:
      - sdk: HealthKit.framework
    settings:
      base:
        INFOPLIST_FILE: MyBody/Info.plist
        CODE_SIGN_ENTITLEMENTS: MyBody/MyBody.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: brickverse.MyBodyApp
        PRODUCT_NAME: 身记
        DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "用于自动识别相册中的 InBody 报告并录入健康数据。"
        INFOPLIST_KEY_NSCameraUsageDescription: "用于拍摄 InBody 报告并自动识别健康数据。"
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "用于将识别出的体重数据同步到「健康」App，方便统一查看与跨 App 共享。"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "用于读取「健康」App 中的体重数据，确认同步是否成功。"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: "身记"
        # 声明 App 不使用任何非豁免加密,避免每次 TestFlight 上传弹出 Export
        # Compliance 问卷;对应 Info.plist 中的 ITSAppUsesNonExemptEncryption=NO。
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"

  MyBodyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MyBodyUITests
    dependencies:
      - target: MyBody
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: brickverse.MyBodyAppUITests
        DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MyBody
